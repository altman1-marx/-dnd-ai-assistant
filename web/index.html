<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DND AI Assistant</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --surface: #fffaf0;
      --surface-2: #f0f7f4;
      --ink: #221f1a;
      --muted: #6e675c;
      --line: #d6cfc0;
      --accent: #1f6f78;
      --accent-2: #8f3f35;
      --focus: #2f6fed;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      min-height: 38px;
      padding: 0 12px;
      cursor: pointer;
    }

    button.secondary {
      background: var(--surface);
      color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    button:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(250px, 320px) minmax(0, 1fr) minmax(260px, 360px);
      min-height: 100vh;
    }

    .sidebar,
    .panel {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 18px;
      overflow: auto;
    }

    .panel {
      border-right: 0;
      border-left: 1px solid var(--line);
      background: var(--surface-2);
    }

    main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 18px;
      gap: 14px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.2;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .compact-row {
      flex: 0 0 auto;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .status {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 10px;
      color: var(--muted);
      min-height: 40px;
      white-space: pre-wrap;
    }

    .transcript {
      flex: 1;
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 14px;
      overflow: auto;
      line-height: 1.45;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 10px;
      white-space: pre-wrap;
    }

    .message strong {
      display: block;
      color: var(--accent);
      font-size: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .message.system strong {
      color: var(--muted);
    }

    .message.ai-dm strong {
      color: var(--accent-2);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      font-size: 14px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .rules-results {
      display: grid;
      gap: 8px;
    }

    .campaign-list {
      display: grid;
      gap: 8px;
    }

    .campaign-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 6px;
      align-items: center;
    }

    .campaign-row button {
      min-height: 32px;
      padding: 0 9px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 10px;
    }

    .item strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .item .score {
      color: var(--muted);
      font-size: 12px;
    }

    .danger {
      color: var(--accent-2);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar,
      .panel {
        border: 0;
        border-bottom: 1px solid var(--line);
      }

      .quick-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar stack">
      <header class="stack">
        <h1>DND AI Assistant</h1>
        <p class="muted">Local campaign console for the lightweight API.</p>
      </header>

      <section class="stack" aria-labelledby="api-title">
        <h2 id="api-title">API</h2>
        <label>
          <span class="muted">Base URL</span>
          <input id="apiBase" value="http://127.0.0.1:8000" autocomplete="off">
        </label>
        <button id="healthButton" type="button" class="secondary">Check API</button>
      </section>

      <section class="stack" aria-labelledby="import-title">
        <h2 id="import-title">Adventure</h2>
        <input id="adventureFile" type="file" accept="application/json,.json">
        <button id="importButton" type="button">Import Adventure</button>
        <button id="demoButton" type="button" class="secondary">Start Demo</button>
        <button id="sampleButton" type="button" class="secondary" disabled>Add Sample Character</button>
      </section>

      <section class="stack" aria-labelledby="campaign-title">
        <h2 id="campaign-title">Campaign</h2>
        <div id="status" class="status">No campaign loaded.</div>
        <button id="campaignsButton" type="button" class="secondary">Refresh Campaigns</button>
        <div id="campaignList" class="campaign-list"></div>
      </section>
    </aside>

    <main>
      <div class="toolbar">
        <div>
          <h2>Table</h2>
          <p id="locationLine" class="muted">Import an adventure to begin.</p>
        </div>
        <div class="row compact-row">
          <button id="refreshButton" type="button" class="secondary" disabled>Refresh</button>
          <button id="clearTranscriptButton" type="button" class="secondary" disabled>Clear Log View</button>
        </div>
      </div>

      <section id="transcript" class="transcript" aria-live="polite"></section>

      <section class="stack" aria-label="Action input">
        <div class="quick-actions">
          <button type="button" class="secondary" data-action="look">Look</button>
          <button type="button" class="secondary" data-action="inspect">Inspect</button>
        </div>
        <div class="row">
          <input id="actionInput" placeholder="Type an action, e.g. go old road" autocomplete="off" disabled>
          <button id="sendButton" type="button" disabled>Send</button>
          <button id="dmButton" type="button" class="secondary" disabled>DM Suggest</button>
        </div>
      </section>
    </main>

    <aside class="panel stack">
      <section>
        <h2>Summary</h2>
        <div id="metrics"></div>
      </section>

      <section>
        <h2>Characters</h2>
        <div id="characters" class="list"></div>
      </section>

      <section>
        <h2>Combat</h2>
        <div id="combat" class="list"></div>
      </section>

      <section class="stack" aria-labelledby="rules-title">
        <h2 id="rules-title">Rules</h2>
        <input id="rulesQuery" placeholder="Search rules, e.g. grapple attack action" autocomplete="off">
        <button id="rulesButton" type="button" class="secondary">Search Rules</button>
        <div id="rulesResults" class="rules-results"></div>
      </section>
    </aside>
  </div>

  <script>
    const state = {
      campaignId: "",
      campaigns: [],
      summary: null,
      transcriptEventIds: new Set()
    };

    const apiBase = document.getElementById("apiBase");
    const adventureFile = document.getElementById("adventureFile");
    const statusBox = document.getElementById("status");
    const transcript = document.getElementById("transcript");
    const campaignList = document.getElementById("campaignList");
    const locationLine = document.getElementById("locationLine");
    const metrics = document.getElementById("metrics");
    const characters = document.getElementById("characters");
    const combat = document.getElementById("combat");
    const rulesQuery = document.getElementById("rulesQuery");
    const rulesResults = document.getElementById("rulesResults");
    const actionInput = document.getElementById("actionInput");
    const sendButton = document.getElementById("sendButton");
    const dmButton = document.getElementById("dmButton");
    const sampleButton = document.getElementById("sampleButton");
    const refreshButton = document.getElementById("refreshButton");
    const clearTranscriptButton = document.getElementById("clearTranscriptButton");
    const quickActions = document.querySelector(".quick-actions");

    document.getElementById("healthButton").addEventListener("click", checkHealth);
    document.getElementById("importButton").addEventListener("click", importAdventure);
    document.getElementById("demoButton").addEventListener("click", loadDemoAdventure);
    document.getElementById("campaignsButton").addEventListener("click", refreshCampaigns);
    sampleButton.addEventListener("click", addSampleCharacter);
    refreshButton.addEventListener("click", refreshSummary);
    clearTranscriptButton.addEventListener("click", clearTranscriptView);
    document.getElementById("rulesButton").addEventListener("click", searchRules);
    rulesQuery.addEventListener("keydown", (event) => {
      if (event.key === "Enter") searchRules();
    });
    sendButton.addEventListener("click", sendTypedAction);
    dmButton.addEventListener("click", suggestTypedAction);
    actionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendTypedAction();
    });
    bindQuickActions();

    setControls(false);
    refreshCampaigns();

    async function checkHealth() {
      try {
        const data = await api("GET", "/health");
        if (data.ok) {
          const features = data.features || {};
          setStatus([
            "API is ready.",
            "Campaigns: " + String(data.campaign_count || 0),
            "Rules: " + featureLabel(features.rules_search),
            "AI DM: " + featureLabel(features.ai_dm),
            "Persistence: " + featureLabel(features.persistent_state)
          ].join("\n"));
        } else {
          setStatus("API responded without ok=true.");
        }
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function importAdventure() {
      const file = adventureFile.files[0];
      if (!file) {
        setStatus("Choose an adventure JSON file first.", true);
        return;
      }
      try {
        const adventure = JSON.parse(await file.text());
        const data = await api("POST", "/campaigns/import", { adventure });
        state.campaignId = data.campaign_id;
        appendTranscriptMessage("System", "Imported " + data.campaign.title + ".");
        setControls(true);
        await refreshCampaigns();
        await refreshSummary();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadDemoAdventure() {
      try {
        const data = await api("POST", "/campaigns/demo-with-character", {});
        state.campaignId = data.campaign_id;
        appendTranscriptMessage("System", "Started demo adventure " + data.campaign.title + " with Leth.");
        setControls(true);
        await refreshCampaigns();
        await refreshSummary();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function addSampleCharacter() {
      if (!state.campaignId) return;
      try {
        const data = await api("POST", "/campaigns/" + state.campaignId + "/sample-character", {});
        appendTranscriptMessage("System", "Added " + data.character.name + ".");
        await refreshSummary();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function refreshSummary() {
      if (!state.campaignId) return;
      try {
        state.summary = await api("GET", "/campaigns/" + state.campaignId + "/summary");
        renderSummary();
        renderRecentEvents(state.summary.recent_events || []);
        setStatus("Campaign " + state.campaignId + " loaded.");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function refreshCampaigns() {
      try {
        const data = await api("GET", "/campaigns");
        state.campaigns = data.campaigns || [];
        renderCampaignList();
      } catch (error) {
        campaignList.innerHTML = "<p class=\"muted\">Campaign list unavailable.</p>";
        setStatus(error.message, true);
      }
    }

    async function loadCampaign(campaignId) {
      if (state.campaignId !== campaignId) {
        transcript.innerHTML = "";
        state.transcriptEventIds.clear();
      }
      state.campaignId = campaignId;
      setControls(true);
      await refreshCampaignLog();
      await refreshSummary();
    }

    async function refreshCampaignLog() {
      if (!state.campaignId) return;
      try {
        const data = await api("GET", "/campaigns/" + state.campaignId + "/log?limit=50");
        renderRecentEvents(data.events || []);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function deleteCampaign(campaignId) {
      try {
        await api("DELETE", "/campaigns/" + campaignId);
        if (state.campaignId === campaignId) clearCampaign();
        await refreshCampaigns();
        setStatus("Deleted campaign " + campaignId + ".");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function sendTypedAction() {
      const action = actionInput.value.trim();
      if (!action) return;
      actionInput.value = "";
      await runAction(action);
    }

    async function suggestTypedAction() {
      const action = actionInput.value.trim();
      if (!action || !state.campaignId) return;
      try {
        const data = await api("POST", "/campaigns/" + state.campaignId + "/dm-suggestion", { action });
        appendTranscriptMessage("AI DM", data.suggestion.text);
        if (data.suggestion.rules && data.suggestion.rules.length) {
          renderRulesResults(data.suggestion.rules);
          appendTranscriptMessage("Rules", ruleSourceSummary(data.suggestion.rules));
        }
        setStatus("AI DM suggestion ready. " + dmSuggestionMetadata(data.metadata));
      } catch (error) {
        appendTranscriptMessage("System", setupHint(error));
        setStatus(error.message, true);
      }
    }

    async function runAction(action) {
      if (!state.campaignId) return;
      try {
        const data = await api("POST", "/campaigns/" + state.campaignId + "/actions", {
          action,
          seed: 5
        });
        appendTranscript(data.transcript);
        (data.messages || []).forEach((message) => state.transcriptEventIds.add(message.id));
        await refreshSummary();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function searchRules() {
      const query = rulesQuery.value.trim();
      if (!query) {
        rulesResults.innerHTML = "<p class=\"muted\">Enter a rules query.</p>";
        return;
      }
      try {
        const data = await api("POST", "/rules/search", { query, limit: 5 });
        renderRulesResults(data.results || []);
        setStatus("Rules search returned " + (data.results || []).length + " result(s).");
      } catch (error) {
        rulesResults.innerHTML = "<p class=\"muted\">" + escapeHtml(setupHint(error)) + "</p>";
        setStatus(error.message, true);
      }
    }

    async function api(method, path, body) {
      const options = {
        method,
        headers: { "Content-Type": "application/json" }
      };
      if (body !== undefined) options.body = JSON.stringify(body);
      const response = await fetch(apiBase.value.replace(/\/$/, "") + path, options);
      const data = await response.json();
      if (!response.ok) throw apiErrorFromResponse(data);
      return data;
    }

    function apiErrorFromResponse(data) {
      const error = data.error || {};
      const message = error.message || data.error_message || "Request failed.";
      const wrapped = new Error(message);
      wrapped.code = error.code || "request_failed";
      return wrapped;
    }

    function setupHint(error) {
      if (error.code === "ai_provider_not_configured") {
        return "Start the API with --ai-provider openai-compatible to enable AI DM suggestions.";
      }
      if (error.code === "rules_corpus_not_configured") {
        return "Start the API with --rules-corpus .dnd_ai\\rules\\srd_5_2_1.jsonl to enable rules search.";
      }
      if (error.code === "ai_provider_error") {
        return "The AI provider request failed. Check the model, base URL, API key, and provider quota.";
      }
      return error.message;
    }

    function renderSummary() {
      const summary = state.summary;
      const location = summary.current_location;
      locationLine.textContent = location ? location.name + " - " + location.public_description : "No current location.";
      metrics.innerHTML = [
        metric("Campaign", summary.title),
        metric("Party level", summary.party_level),
        metric("Characters", summary.characters.length),
        metric("Quests", summary.active_quest_count + "/" + summary.quest_count + " active"),
        metric("Clues", summary.discovered_clue_count + "/" + summary.clue_count + " discovered"),
        metric("Exits", location ? location.exits.map((exit) => exit.name).join(", ") || "None" : "None"),
        metric("NPCs", location ? location.npcs.map((npc) => npc.name).join(", ") || "None" : "None")
      ].join("");
      renderQuickActions(summary.available_actions || []);

      characters.innerHTML = summary.characters.length
        ? summary.characters.map(renderCharacter).join("")
        : "<p class=\"muted\">No characters yet.</p>";

      combat.innerHTML = summary.active_combat
        ? renderCombat(summary.active_combat)
        : "<p class=\"muted\">No active combat.</p>";
    }

    function renderCampaignList() {
      if (!state.campaigns.length) {
        campaignList.innerHTML = "<p class=\"muted\">No in-memory campaigns.</p>";
        return;
      }
      campaignList.innerHTML = state.campaigns.map((campaign) => {
        const active = campaign.id === state.campaignId ? "Active" : "Open";
        return "<div class=\"item campaign-row\"><div><strong>" + escapeHtml(campaign.title)
          + "</strong><p class=\"muted\">" + escapeHtml(campaign.id)
          + " | Level " + escapeHtml(String(campaign.party_level))
          + " | Characters " + escapeHtml(String(campaign.character_count))
          + " | Events " + escapeHtml(String(campaign.session_event_count || 0))
          + "</p></div><button type=\"button\" class=\"secondary\" data-load-campaign=\"" + escapeHtml(campaign.id)
          + "\">" + active + "</button><button type=\"button\" class=\"secondary danger\" data-delete-campaign=\""
          + escapeHtml(campaign.id) + "\">Delete</button></div>";
      }).join("");
      document.querySelectorAll("[data-load-campaign]").forEach((button) => {
        button.addEventListener("click", () => loadCampaign(button.dataset.loadCampaign));
      });
      document.querySelectorAll("[data-delete-campaign]").forEach((button) => {
        button.addEventListener("click", () => deleteCampaign(button.dataset.deleteCampaign));
      });
    }

    function clearCampaign() {
      state.campaignId = "";
      state.summary = null;
      clearTranscriptView();
      locationLine.textContent = "Import an adventure to begin.";
      metrics.innerHTML = "";
      characters.innerHTML = "";
      combat.innerHTML = "";
      setControls(false);
    }

    function clearTranscriptView() {
      state.transcriptEventIds.clear();
      transcript.innerHTML = "";
    }

    function metric(label, value) {
      return "<div class=\"metric\"><span>" + escapeHtml(label) + "</span><strong>" + escapeHtml(String(value)) + "</strong></div>";
    }

    function renderCharacter(character) {
      const spellcasting = character.spellcasting
        ? "<p class=\"muted\">Slots " + character.spellcasting.slots.map((slot) => {
            return escapeHtml("L" + slot.level + " " + slot.available + "/" + slot.total);
          }).join(", ") + "</p><p class=\"muted\">" + character.spellcasting.known_spells.map((spell) => escapeHtml(spell.name)).join(", ") + "</p>"
        : "";
      return "<div class=\"item\"><strong>" + escapeHtml(character.name) + "</strong><p class=\"muted\">Level "
        + escapeHtml(String(character.level)) + " " + escapeHtml(character.ancestry) + " "
        + escapeHtml(character.class_name) + "</p><p>HP "
        + escapeHtml(String(character.current_hp)) + "/" + escapeHtml(String(character.max_hp))
        + " | AC " + escapeHtml(String(character.armor_class)) + "</p>" + spellcasting + "</div>";
    }

    function renderCombat(activeCombat) {
      const lines = [
        metric("Round", activeCombat.round),
        metric("Turn", activeCombat.turn || "unknown")
      ];
      const initiative = activeCombat.initiative || [];
      lines.push(initiative.map((entry) => {
        return "<div class=\"item\"><strong>" + escapeHtml(entry.name || "unknown") + "</strong><p class=\"muted\">Initiative "
          + escapeHtml(String(entry.initiative_total)) + " | AC " + escapeHtml(String(entry.armor_class || "?"))
          + " | HP " + escapeHtml(String(entry.current_hp || "?")) + "</p></div>";
      }).join(""));
      return lines.join("");
    }

    function renderRulesResults(results) {
      if (!results.length) {
        rulesResults.innerHTML = "<p class=\"muted\">No matching rules found.</p>";
        return;
      }
      rulesResults.innerHTML = results.map((result) => {
        const excerpt = result.text.length > 360 ? result.text.slice(0, 357).trim() + "..." : result.text;
        return "<div class=\"item\"><strong>" + escapeHtml(result.section)
          + "</strong><p class=\"score\">Score " + escapeHtml(String(result.score))
          + " | " + escapeHtml(result.title) + "</p><p>"
          + escapeHtml(excerpt) + "</p><p class=\"muted\">"
          + escapeHtml(result.url) + "</p></div>";
      }).join("");
    }

    function ruleSourceSummary(rules) {
      return "Referenced: " + rules.map((rule) => rule.section).join(", ");
    }

    function dmSuggestionMetadata(metadata) {
      if (!metadata) return "";
      return metadata.used_rules ? "Rules referenced: " + String(metadata.rules_count) + "." : "No rules referenced.";
    }

    function renderRecentEvents(events) {
      events.forEach((event) => {
        if (state.transcriptEventIds.has(event.id)) return;
        state.transcriptEventIds.add(event.id);
        appendTranscriptMessage(event.actor, event.content);
      });
    }

    function appendTranscript(text) {
      if (!text) return;
      text.split(/\n\n+/).forEach((block) => {
        const trimmed = block.trim();
        if (!trimmed) return;
        const parsed = trimmed.match(/^([^:\n]{1,32}):\s*([\s\S]*)$/);
        if (parsed) {
          appendTranscriptMessage(parsed[1], parsed[2]);
        } else {
          appendTranscriptMessage("Log", trimmed);
        }
      });
    }

    function appendTranscriptMessage(actor, content) {
      if (!content) return;
      const message = document.createElement("article");
      message.className = "message " + actorClass(actor);
      const label = document.createElement("strong");
      label.textContent = actor;
      const body = document.createElement("div");
      body.textContent = content;
      message.appendChild(label);
      message.appendChild(body);
      transcript.appendChild(message);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function actorClass(actor) {
      return actor.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function setStatus(text, error) {
      statusBox.textContent = text;
      statusBox.classList.toggle("danger", Boolean(error));
    }

    function setControls(enabled) {
      sampleButton.disabled = !enabled;
      refreshButton.disabled = !enabled;
      clearTranscriptButton.disabled = !enabled;
      actionInput.disabled = !enabled;
      sendButton.disabled = !enabled;
      dmButton.disabled = !enabled;
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.disabled = !enabled;
      });
    }

    function renderQuickActions(actions) {
      const fallback = ["look", "inspect"];
      const preferred = actions.length ? actions : fallback;
      quickActions.innerHTML = preferred.map((action) => {
        return "<button type=\"button\" class=\"secondary\" data-action=\"" + escapeHtml(action) + "\">"
          + escapeHtml(actionLabel(action)) + "</button>";
      }).join("");
      bindQuickActions();
      setControls(Boolean(state.campaignId));
    }

    function bindQuickActions() {
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => runAction(button.dataset.action));
      });
    }

    function actionLabel(action) {
      return action.replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function featureLabel(enabled) {
      return enabled ? "enabled" : "disabled";
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (character) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        }[character];
      });
    }

  </script>
</body>
</html>
